# Cloudflare Workers + Pages 混合部署配置
# 架构：Workers 提供 API + D1 存储 + Pages 托管静态文件

name = "profile-page"
main = "workers.js"
compatibility_date = "2024-09-19"
workers_dev = true
preview_urls = false

# D1 数据库绑定（默认配置，本地开发使用 --local 模式）
[[d1_databases]]
binding = "PROFILE_DB"
database_name = "profile-page-db"
database_id = "9cff7945-9742-4e5c-90ac-bb83286de74f"

# 环境变量
[vars]
PROFILE_PAGE_TITLE = "EnkanSakura Profile"
ENVIRONMENT = "dev"

# 开发环境配置
[env.dev]
name = "profile-page-dev"
[[env.dev.d1_databases]]
binding = "PROFILE_DB"
database_name = "profile-page-db"
database_id = "9cff7945-9742-4e5c-90ac-bb83286de74f"
[env.dev.vars]
ENVIRONMENT = "dev"

# 生产环境配置
[env.production]
name = "profile-page-prod"
workers_dev = true
    [env.production.route]
    pattern = "me.enkansakura.top/*"
    zone_name = "enkansakura.top"

    [[env.production.d1_databases]]
    binding = "PROFILE_DB"
    database_name = "profile-page-db"
    database_id = "9cff7945-9742-4e5c-90ac-bb83286de74f"

    [env.production.vars]
    ENVIRONMENT = "production"
    AUTH_FUNC = "key"
    PROFILE_PAGE_TITLE = "EnkanSakura Profile"

