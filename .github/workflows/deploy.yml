name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          environment: production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Zero Trust configuration
        if: ${{ secrets.ZERO_TRUST_TEAM_NAME != '' }}
        run: |
          echo "Setting Zero Trust configuration..."
          npx wrangler secret put ZERO_TRUST_TEAM_NAME --env production <<< "$ZERO_TRUST_TEAM_NAME"
          npx wrangler secret put ZERO_TRUST_POLICY_ID --env production <<< "$ZERO_TRUST_POLICY_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ZERO_TRUST_TEAM_NAME: ${{ secrets.ZERO_TRUST_TEAM_NAME }}
          ZERO_TRUST_POLICY_ID: ${{ secrets.ZERO_TRUST_POLICY_ID }}

      - name: Set AUTH_KEY secret (optional)
        if: ${{ secrets.AUTH_KEY != '' }}
        run: echo "$AUTH_KEY" | npx wrangler secret put AUTH_KEY --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AUTH_KEY: ${{ secrets.AUTH_KEY }}