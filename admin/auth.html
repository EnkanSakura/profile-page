<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员认证 - EnkanSakura Profile</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="stylesheet" href="/admin/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo"><i class="fas fa-shield-alt"></i></div>
                <h1>管理员认证</h1>
                <p class="subtitle">请输入 Token 以访问后台管理系统</p>
            </div>
            <div class="auth-body">
                <form id="authForm">
                    <div class="form-group" id="tokenInputGroup" style="display: none;">
                        <label for="token"><i class="fas fa-key"></i> 认证 Token</label>
                        <input type="password" id="token" placeholder="请输入认证 Token" autocomplete="off" autofocus />
                    </div>
                    <div class="dev-hint" id="devHint" style="display: none;">
                        <i class="fas fa-info-circle"></i>
                        <span>开发环境可直接点击按钮进入</span>
                    </div>
                    <div class="zerotrust-hint" id="zerotrustHint" style="display: none;">
                        <i class="fas fa-cloud"></i>
                        <span>Zero Trust 模式，点击按钮进入后台</span>
                    </div>
                    <div class="auth-actions">
                        <button type="button" class="btn btn-primary" id="submitBtn" onclick="handleAuth()" style="display: none;">认证并进入</button>
                        <button type="button" class="btn btn-dev" id="devBtn" onclick="devEnter()" style="display: none;">
                            <i class="fas fa-bolt"></i> 快速进入
                        </button>
                        <button type="button" class="btn btn-zerotrust" id="zerotrustBtn" onclick="zerotrustEnter()" style="display: none;">
                            <i class="fas fa-cloud"></i> 进入后台
                        </button>
                    </div>
                </form>
                <div class="auth-footer"><a href="/" class="back-link">返回首页</a></div>
            </div>
        </div>
        <div class="auth-notification" id="notification"></div>
    </div>
    <script src="/admin/auth.js"></script>
</body>
</html>
