<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnkanSakura Profile</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="page-loader" id="pageLoader" aria-live="polite">
        <div class="page-loader__spinner"></div>
        <div class="page-loader__progress">
            <div class="page-loader__progress-bar"></div>
        </div>
    </div>
    <div class="container" aria-hidden="true">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar">
                    <img id="avatar" alt="头像" />
                </div>
                <h1 class="username" id="username"></h1>
                <p class="bio" id="bio"></p>
            </div>
            <div class="social-links" id="social-links"></div>
            <div class="footer">
                <p id="footer"></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
